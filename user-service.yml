server:
  port: 8082
  forward-headers-strategy: framework
  servlet:
    context-path: /api

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://${DB}?serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml

app:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    topics:
      user-registered:
        name: ${USER_REGISTERED_TOPIC:user.registered.v1}
        partitions: ${USER_REGISTERED_PARTITIONS:3}
        replicas: ${USER_REGISTERED_REPLICAS:1}

      user-updated:
        name: ${USER_UPDATED_TOPIC:user.updated.v1}
        partitions: ${USER_UPDATED_PARTITIONS:3}
        replicas: ${USER_UPDATED_REPLICAS:1}

      user-deleted:
        name: ${USER_DELETED_TOPIC:user.deleted.v1}
        partitions: ${USER_DELETED_PARTITIONS:3}
        replicas: ${USER_DELETED_REPLICAS:1}

      notification-email-requested:
        name: ${NOTIFICATION_EMAIL_REQUESTED_TOPIC:notification.email.requested.v1}
        partitions: ${NOTIFICATION_EMAIL_REQUESTED_PARTITIONS:3}
        replicas: ${NOTIFICATION_EMAIL_REQUESTED_REPLICAS:1}
    groups:
      user-service:
        id: ${USER_REGISTERED_GROUP_ID:user-service-group}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA}
    register-with-eureka: true
    fetch-registry: true
  instance:
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
  api-docs:
    path: /v3/api-docs

cors:
  allowed-origins: ${ALLOWED_ORIGINS}

request-id:
  prefix: ${REQUEST_ID_PREFIX:request-id:}
  ttl: ${REQUEST_ID_TTL:30s}
  value: ${REQUEST_ID_VALUE:user-service}

header-request-id:
  name: ${HEADER_REQUEST_ID_NAME:X-Request-Id}

user-context:
  userContextHeader: ${USER_CONTEXT_HEADER:X-User-Context}

security:
  user-context:
    issuer: api-gateway
    key-id: gateway-key-1
    public-key-pem: ${USER_CONTEXT_PUBLIC_KEY_PEM:}
    public-key-path: ${USER_CONTEXT_PUBLIC_KEY_PATH:./secrets/gateway-user-context-public.pem}

